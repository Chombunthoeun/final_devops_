apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: school-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql

        image: mysql:8.0

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root

        - name: MYSQL_DATABASE
          value: laravel_app

        - name: MYSQL_USER
          value: laravel

        - name: MYSQL_PASSWORD
          value: secret

        volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysql-storage

      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc