apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: school-system
spec:
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args: ["tunnel", "--no-autoupdate", "run", "--token", "$(TOKEN)"]
        env:
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-token
              key: token