apiVersion: apps/v1
kind: Deployment

metadata:
  name: laravel
  namespace: school-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: laravel

  template:
    metadata:
      labels:
        app: laravel

    spec:
      containers:
      - name: laravel

        image: my-laravel-app:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: laravel-config

        - secretRef:
            name: laravel-secret